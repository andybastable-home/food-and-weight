<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3f7f6a" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a2622" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Personal food, weight, waist, and workout log.">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./styles.css">
  <title>Food &amp; Weight</title>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="./icons/icon.svg" alt="" class="brand-mark" width="32" height="32">
      <span class="brand-name">Food &amp; Weight</span>
      <span class="brand-version" aria-label="App version">v0.5.3</span>
    </div>
  </header>

  <main class="container">
    <section class="date-nav" aria-label="Date navigation">
      <button id="prev-day" class="date-nav-btn" type="button" aria-label="Previous day">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6"/></svg>
      </button>
      <div class="date-nav-label">
        <h1 id="date-label" class="date-nav-main">Today</h1>
        <p id="date-sub" class="date-nav-sub"></p>
      </div>
      <button id="next-day" class="date-nav-btn" type="button" aria-label="Next day">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6"/></svg>
      </button>
    </section>

    <nav class="tabs" role="tablist" aria-label="Entry type">
      <button class="tab is-active" type="button" role="tab" data-tab="food" aria-selected="true">Food</button>
      <button class="tab" type="button" role="tab" data-tab="weight" aria-selected="false">Weight</button>
      <button class="tab" type="button" role="tab" data-tab="waist" aria-selected="false">Waist</button>
      <button class="tab" type="button" role="tab" data-tab="workout" aria-selected="false">Workout</button>
      <button class="tab" type="button" role="tab" data-tab="ai" aria-selected="false">AI</button>
    </nav>

    <div id="entry-form-container"></div>

    <section class="entries-section" aria-label="Entries">
      <ul id="entries-list" class="entries-list"></ul>
      <div id="empty-state" class="empty-state" hidden>
        <p>Nothing logged yet for this day.</p>
      </div>
    </section>

    <div id="tab-ai" class="tab-page hidden" aria-label="AI configuration">
      <div class="ai-config-section">
        <label class="ai-config-label" for="cfg-ai-key">Gemini API Key</label>
        <input type="password" id="cfg-ai-key" class="ai-config-input" placeholder="Paste your Gemini API key" autocomplete="off">
      </div>
      <div class="ai-config-section">
        <label class="ai-config-label" for="cfg-ai-context">Personal Diet Profile</label>
        <textarea id="cfg-ai-context" class="ai-config-textarea" placeholder="Describe your diet rules, typical portions, calorie estimates for your common meals&#10;&#10;e.g. * My standard lunch salad is 320 calories&#10;* Homemade white bread slice = 65g ≈ 160 kcal"></textarea>
      </div>
      <p class="ai-config-hint">Key and profile are saved locally. Profile syncs to your Google Sheet when connected.</p>
    </div>

    <section class="sync-settings" aria-label="Sheets sync">
      <button id="sync-connect" type="button" class="btn btn-ghost">Connect Sheets</button>
      <a id="sync-sheet-link" href="#" target="_blank" rel="noopener" hidden>Open sheet</a>
      <button id="sync-forget" type="button" class="btn btn-ghost" hidden>Disconnect</button>
    </section>
  </main>

  <footer class="app-footer">
    <span>v0.5.3 &middot; offline-ready</span>
  </footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/dexie@4.4.2/dist/dexie.min.js"></script>
  <script src="./app.js"></script>
  <script src="./sync.js"></script>
</body>
</html>
